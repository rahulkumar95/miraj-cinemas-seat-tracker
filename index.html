<!DOCTYPE html>
<html>

<head>
  <title>Seat Tracker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      margin: 10px;
    }

    h2 {
      margin-top: 20px;
    }

    #movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .movie-card {
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      border-radius: 10px;
    }

    .movie-title {
      font-size: 12px;
      margin-top: 5px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .selected {
      background: green !important;
    }

    .movie-card.selected {
      border: 2px solid green;
    }

    #trackBtn {
      margin: 10px 5px;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      border-radius: 8px;
    }

    #trackBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <h2>📋 Active Trackings</h2>
  <div id="active"></div>

  <h2>🎬 Movies</h2>
  <div id="movies"></div>

  <h2 id="datesTitle">📅 Dates</h2>
  <div id="dates"></div>

  <h2>⏰ Timings</h2>
  <div id="timings"></div>

  <button id="trackBtn" onclick="startTracking()" disabled>🚀 Start Tracking</button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

  <script>
    (function () {
      var script = document.createElement('script');
      // Generate a unique timestamp (e.g., 1714582381)
      var timestamp = new Date().getTime();
      script.src = "app.js?v=" + timestamp;
      document.head.appendChild(script);
    })();
  </script>

</body>

</html>
