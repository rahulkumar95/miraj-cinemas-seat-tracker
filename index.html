<!DOCTYPE html>
<html>

<head>
  <title>Seat Tracker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      margin: 10px;
    }

    h2 {
      margin-top: 20px;
    }

    #movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .movie-card {
      text-align: center;
      cursor: pointer;
    }

    .movie-card img {
      width: 100%;
      border-radius: 10px;
    }

    .movie-title {
      font-size: 12px;
      margin-top: 5px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .selected {
      background: green !important;
    }

    .movie-card.selected {
      border: 2px solid green;
    }
  </style>
</head>

<body>

  <h2>📋 Active Trackings</h2>
  <div id="active"></div>

  <h2>🎬 Movies</h2>
  <div id="movies"></div>

  <h2 id="datesTitle">📅 Dates</h2>
  <div id="dates"></div>

  <h2>⏰ Timings</h2>
  <div id="timings"></div>

  <button style="width:100%;padding:15px;font-size:18px" onclick="startTracking()">
    🚀 Start Tracking
  </button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

  <script src="app.js"></script>

</body>

</html>
